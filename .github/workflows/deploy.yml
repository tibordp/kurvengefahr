name: Deploy to GitHub Pages

# Manual-only: CI (ci.yml) runs on every push to main; publishing to kurvengefahr.org is a
# deliberate act via the Actions "Run workflow" button.
on:
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish (don't cancel a publish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Latest LTS: keeps CI's npm in step with the npm that writes package-lock.json
          # (an older npm can reject a lockfile a newer one wrote — that broke npm ci on node 20).
          node-version: lts/*
          cache: npm

      # The build's `prebuild` step compiles the Rust crate to WASM, so the toolchain is required.
      - name: Install Rust (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crate

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - run: npm ci
      - run: npm run build # prebuild → build:wasm, then tsc + vite build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
